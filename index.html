<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖靈月刊運費試算 | Holy Spirit Monthly Shipping Calculator</title>
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #3498db; --error-color: #e74c3c; }
        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .lang-switch { text-align: right; margin-bottom: 1rem; }
        .lang-btn { background: none; border: 1px solid #ddd; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-size: 0.8rem; transition: 0.3s; }
        .lang-btn:hover { background: #eee; }
        h2 { color: var(--primary-color); text-align: center; margin-bottom: 1.5rem; font-size: 1.5rem; border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.6rem; font-weight: bold; color: #444; font-size: 0.95rem; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; box-sizing: border-box; transition: 0.3s; }
        select:focus, input:focus { border-color: var(--accent-color); outline: none; box-shadow: 0 0 5px rgba(52,152,219,0.3); }
        .result-box { background: #f0f7ff; padding: 1.5rem; border-radius: 10px; margin-top: 1.5rem; border-left: 5px solid var(--accent-color); }
        .result-line { display: flex; justify-content: space-between; margin-bottom: 0.8rem; font-size: 1rem; }
        .total-price { color: var(--error-color); font-weight: bold; font-size: 1.4rem; border-top: 1px solid #d1d8dd; margin-top: 10px; padding-top: 10px; }
        .alert { color: #d35400; background: #fff3cd; padding: 10px; border-radius: 6px; font-size: 0.85rem; margin-top: 10px; border: 1px solid #ffeeba; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="lang-switch">
        <button class="lang-btn" onclick="setLang('zh')">中文</button>
        <button class="lang-btn" onclick="setLang('en')">English</button>
    </div>

    <h2 id="ui-title">一年份運費試算</h2>
    
    <div class="form-group">
        <label id="ui-label-region">1. 選擇區域 (Region)</label>
        <select id="region" onchange="calculate()">
            <option value="HK_MO">香港、澳門 | HK & Macao</option>
            <option value="ASIA_OCEANIA">亞洲、大洋洲 | Asia & Oceania</option>
            <option value="EU_AM_AF">歐、美、非洲 | Europe, America & Africa</option>
        </select>
    </div>

    <div class="form-group">
        <label id="ui-label-method">2. 運送方式 (Shipping Method)</label>
        <select id="method" onchange="calculate()">
            <option value="AIR" id="opt-air">航空 Air (7-20 Days)</option>
            <option value="SEA" id="opt-sea">水陸 Sea (60-90 Days)</option>
        </select>
    </div>

    <div class="form-group">
        <label id="ui-label-qty">3. 訂閱本數 (Quantity of Sets)</label>
        <input type="number" id="quantity" value="1" min="1" oninput="calculate()">
    </div>

    <div id="result" class="result-box">
        <div class="result-line">
            <span id="ui-res-unit">單套一年運費：</span>
            <span id="unit-fee">NT$ 0</span>
        </div>
        <div class="result-line total-price">
            <span id="ui-res-total">總計運費：</span>
            <span id="total-fee">NT$ 0</span>
        </div>
        <div id="alert-msg" class="alert"></div>
    </div>
</div>
